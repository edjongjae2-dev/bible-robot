name: Daily Bible & News Robot

on:
  schedule:
    # 🌟 서머타임 및 서버 지연을 고려하여 시간을 1시간 더 당겼습니다.
    # UTC 기준 18:45 (한국 시간 새벽 03:45 출발)
    # 목표 도착 시간: 한국 시간 오전 05:05 ~ 05:15
    - cron: '45 18 * * *'  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 deep-translator Pillow

      - name: Run Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bible_robot.py
