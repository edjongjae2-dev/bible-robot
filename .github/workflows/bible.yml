name: Daily Bible & News Robot

on:
  schedule:
    - cron: '32 19 * * *' # 한국 시간 새벽 04:32
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 유저님의 소중한 코드가 작동하는 데 필요한 모든 부품들입니다.
          pip install requests beautifulsoup4 deep-translator

      - name: Run Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 🌟 파일 이름을 bible_robot.py로 정확히 맞췄습니다!
        run: python bible_robot.py
