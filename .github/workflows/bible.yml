name: Daily Bible & News Robot

on:
  schedule:
    # 한국 시간(KST) 새벽 04:32 (UTC 기준 19:32)
    - cron: '32 19 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 v4로 업그레이드

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 v5로 업그레이드
        with:
          python-version: '3.10' # 조금 더 안정적인 버전

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance beautifulsoup4 google-generativeai
          # 🌟 로봇이 필요한 모든 부품을 한꺼번에 설치하도록 명령합니다.

      - name: Run Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefing_robot.py
