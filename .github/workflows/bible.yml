name: Daily Bible & News Robot

on:
  schedule:
    # 🌟 한국 시간 오전 05:10 도착을 목표로 설정
    # GitHub 서버 지연(약 20~25분)을 고려하여 한국 시간 04:45에 출발시킵니다.
    # UTC 기준으로는 전날 19:45 입니다. ('분 시 일 월 요일')
    - cron: '45 19 * * *'  
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 로봇이 Day를 기록하려면 전체 권한이 필요하므로 추가합니다.
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 deep-translator Pillow

      - name: Run Robot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 실행할 파일 이름이 bible_robot.py 인지 꼭 확인하세요!
        run: python bible_robot.py
